<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PURE WATER TRACKER</title>
    <style>
        :root {
            --bg-color: #0c0c0c;
            --card-bg: #1c1c1e;
            --accent-green: #34c759;
            --accent-yellow: #ffcc00;
            --accent-red: #ff453a;
            --accent-blue: #0a84ff;
            --text-main: #ffffff;
            --text-sub: #8e8e93;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 380px; }

        .top-title { font-size: 18px; font-weight: 900; text-align: center; margin-bottom: 2px; letter-spacing: 2.5px; text-transform: uppercase; }
        .top-title span { color: var(--accent-blue); }
        .top-sub { font-size: 9px; color: var(--text-sub); text-align: center; margin-bottom: 25px; font-weight: 500; letter-spacing: 1px; }
        
        /* 動的アラート */
        .alert-msg { font-size: 12px; font-weight: 800; color: var(--accent-red); margin-bottom: 15px; display: none; text-align: center; animation: blink 1s infinite; }
        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.4;} 100% {opacity: 1;} }

        .header-section { text-align: center; margin-bottom: 20px; min-height: 180px; display: flex; flex-direction: column; justify-content: center; align-items: center; width: 100%; }
        .main-val-wrap { position: relative; cursor: pointer; }
        .main-val { font-size: 68px; font-weight: 800; line-height: 1; }
        .unit-l { font-size: 32px; font-weight: 400; margin-left: 4px; }
        
        .sub-stats { display: flex; justify-content: space-around; font-size: 11px; color: var(--text-sub); margin-bottom: 25px; width: 100%; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; width: 100%; }
        .card { background: var(--card-bg); padding: 15px; border-radius: 12px; text-align: center; }
        .card-full { background: var(--card-bg); padding: 15px; border-radius: 12px; text-align: center; margin-bottom: 25px; width: 100%; }
        
        .input-box { background: var(--card-bg); padding: 25px 20px; border-radius: 20px; margin-bottom: 15px; width: 100%; }
        .input-title { font-size: 11px; color: var(--accent-green); font-weight: bold; text-align: center; margin-bottom: 15px; }
        .counter-row { display: flex; justify-content: center; align-items: center; gap: 40px; margin-bottom: 15px; }
        .btn-round { width: 50px; height: 50px; border-radius: 50%; border: none; background: #3a3a3c; color: white; font-size: 26px; }
        .current-disp { font-size: 52px; font-weight: bold; width: 100px; text-align: center; }
        .btn-clear { background: #3a3a3c; color: var(--text-sub); border: none; padding: 6px 16px; border-radius: 20px; font-size: 11px; display: block; margin: 0 auto 20px; }
        
        .btn-save { width: 100%; background: var(--accent-green); color: white; padding: 22px; border-radius: 18px; border: none; font-size: 16px; font-weight: bold; margin-bottom: 10px; box-shadow: 0 4px 15px rgba(52, 199, 89, 0.3); }
        .btn-reset { width: 100%; background: none; border: 1px solid #331111; color: #662222; padding: 12px; border-radius: 12px; font-size: 11px; margin-bottom: 25px; }
        
        .settings-box { background: var(--card-bg); padding: 25px 20px; border-radius: 20px; width: 100%; margin-bottom: 30px; }
        .setting-item { display: flex; justify-content: space-between; align-items: center; }
        .ppm-input { background: none; border: none; color: var(--accent-green); font-weight: bold; font-size: 24px; text-align: right; width: 100px; border-bottom: 1px solid #3a3a3c; }

        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); display:none; justify-content:center; align-items:center; z-index:1000; padding:20px; }
        .modal-content { background: #1c1c1e; width:100%; max-width:360px; border-radius:24px; padding:25px; border: 1px solid #3a3a3c; overflow-y: auto; max-height: 90vh; }
        .detail-label { font-size: 11px; color: var(--text-sub); display: flex; align-items: center; gap: 8px; margin-bottom: 12px; margin-top: 20px; }
        .detail-label::before { content: ""; width: 3px; height: 14px; background: var(--accent-blue); border-radius: 2px; }

        .chart-container { background: #141414; border-radius: 12px; padding: 40px 15px 15px; height: 180px; display: flex; align-items: flex-end; gap: 8px; position: relative; margin-bottom: 20px; }
        .avg-line { position: absolute; left: 0; width: 100%; border-top: 1px dashed #fff; z-index: 10; opacity: 0.6; pointer-events: none; }
        .avg-label { position: absolute; right: 5px; color: #fff; font-size: 9px; font-weight: bold; transform: translateY(-120%); }
        .bar { flex: 1; background: var(--accent-blue); min-height: 2px; border-radius: 4px 4px 0 0; position: relative; z-index: 2; }
        .bar.over { background: var(--accent-red); box-shadow: 0 0 10px rgba(255, 69, 58, 0.5); }

        .summary-card { background: #2c2c2e; border-radius: 12px; padding: 18px 15px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .summary-date { font-size: 15px; font-weight: 500; }
        .summary-val { font-size: 14px; font-weight: bold; color: var(--accent-green); }
        .btn-del-mini { background: rgba(255,69,58,0.1); border: none; color: var(--accent-red); font-size: 10px; padding: 6px 12px; border-radius: 6px; }

        .footer-version { font-size: 10px; color: #333; text-align: center; margin-top: 30px; margin-bottom: 80px; }
    </style>
</head>
<body>

<div class="container">
    <div class="top-title">PURE WATER <span>TRACKER.</span></div>
    <div class="top-sub">ULTIMATE RESIN MANAGEMENT TOOL</div>

    <div id="alertArea" class="alert-msg">⚠️ 異常消費を検知：平均を大きく逸脱 🔥</div>

    <div class="header-section" id="headerSection"></div>

    <div class="sub-stats"><span>洗車回数：あと <span id="remCount">--</span> 回分</span><span id="predictDate">寿命予測：--/--頃</span></div>

    <div class="stats-grid">
        <div class="card"><div class="label-xs">累計使用量</div><div id="totalUsed">0 ℓ</div></div>
        <div class="card"><div class="label-xs">今月の使用量</div><div id="monthUsed">0 ℓ</div></div>
    </div>
    <div class="card-full"><div class="label-xs">今月の算出コスト</div><div id="costDisp">0 円</div></div>

    <div class="input-box">
        <div class="input-title">今回の洗車使用量</div>
        <div class="counter-row">
            <button class="btn-round" onclick="add(-1)">−</button>
            <div class="current-disp"><span id="inVal">0</span><span style="font-size:24px; margin-left:4px; color:var(--text-sub);">ℓ</span></div>
            <button class="btn-round" onclick="add(1)">＋</button>
        </div>
        <button class="btn-clear" onclick="clr()">リセット</button>
    </div>

    <button class="btn-save" id="saveBtn" onclick="save()">記録を保存</button>
    <button id="resetBtn" class="btn-reset">長押しで全履歴を消去</button>
    
    <div class="settings-box">
        <div class="setting-item">
            <span class="label-xs" style="color:var(--text-main); margin:0;">水道水硬度 (ppm)</span>
            <input type="number" id="ppmIn" class="ppm-input" placeholder="0" oninput="setPPM(this.value)">
        </div>
    </div>

    <div class="footer-version">Version 1.0.1</div>
</div>

<div id="modalOverlay" class="modal-overlay" onclick="closeDetail()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div style="color:var(--accent-blue); text-align:center; font-weight:900; letter-spacing:1px; margin-bottom:20px;">CONDITION DETAIL</div>
        <div class="detail-label">直近10件の使用傾向（白線：平均）</div>
        <div class="chart-container" id="chartContainer"></div>
        <div class="detail-label">月別サマリー</div>
        <div id="monthlySummaryArea"></div>
        <button style="width:100%; background:#3a3a3c; border:none; color:white; padding:18px; border-radius:18px; font-weight:bold; margin-top:30px;" onclick="closeDetail()">閉じる</button>
    </div>
</div>

<script>
    const STORAGE_KEY = 'pwMasterV101_Full';
    let d = JSON.parse(localStorage.getItem(STORAGE_KEY)) || { ppm: null, used: 0, in: 0, logs: {}, history: [] };

    function getAvg() {
        const recent = d.history.slice(0, 10);
        return recent.length > 0 ? (recent.reduce((a,b)=>a+b.amt,0)/recent.length) : 30;
    }

    function up() {
        const header = document.getElementById('headerSection');
        const alertArea = document.getElementById('alertArea');
        const avg = getAvg();
        const now = new Date(), monthKey = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;

        alertArea.style.display = (d.in > avg * 1.5 && d.in > 0) ? 'block' : 'none';

        if (!d.ppm) {
            header.innerHTML = `<div style="color:var(--accent-yellow); font-size:12px; border:1px dashed #443300; padding:20px; border-radius:15px;">PPMを設定して開始してください</div>`;
        } else {
            const cap = 180000 / d.ppm;
            const rem = Math.max(0, cap - d.used);
            header.innerHTML = `<div class="label-xs">樹脂寿命まであと</div><div class="main-val-wrap" onclick="showDetail()"><span class="main-val" style="color:${rem/cap < 0.1 ? 'var(--accent-red)' : 'var(--accent-green)'}">${Math.floor(rem)}<span class="unit-l">ℓ</span></span></div><div style="font-size:10px; color:var(--text-sub); margin-top:10px; border-bottom:1px solid #333; padding-bottom:5px;">履歴・グラフを確認する</div>`;
            document.getElementById('remCount').innerText = Math.floor(rem / avg);
            document.getElementById('costDisp').innerText = Math.round(((d.logs[monthKey]||0)/cap)*12980).toLocaleString() + ' 円';
            const t = new Date(); t.setDate(now.getDate() + Math.floor((rem/avg)*7));
            document.getElementById('predictDate').innerText = `寿命予測：${t.getMonth()+1}/${t.getDate()}頃`;
        }
        document.getElementById('ppmIn').value = d.ppm || "";
        document.getElementById('totalUsed').innerText = d.used + ' ℓ';
        document.getElementById('monthUsed').innerText = (d.logs[monthKey]||0) + ' ℓ';
        document.getElementById('inVal').innerText = d.in;
        document.getElementById('inVal').style.color = (d.in > avg * 1.5) ? 'var(--accent-red)' : 'var(--text-main)';
        localStorage.setItem(STORAGE_KEY, JSON.stringify(d));
    }

    function setPPM(v) { d.ppm = v===""?null:parseInt(v); up(); }
    function add(v) { d.in = Math.max(0, d.in+v); up(); }
    function clr() { d.in=0; up(); }
    function save() {
        if (!d.ppm || d.in <= 0) return;
        const now = new Date(), monthKey = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2, '0')}`;
        d.history.unshift({ ts: now.getTime(), amt: d.in });
        d.used += d.in; d.logs[monthKey] = (d.logs[monthKey]||0) + d.in;
        d.in = 0; up();
    }
    function delMonth(key) { if(confirm(`${key}の月別データを消去しますか？`)) { delete d.logs[key]; up(); showDetail(); } }

    function showDetail() {
        const cap = (180000 / (d.ppm || 1));
        const recent = d.history.slice(0, 10).reverse(); 
        const avg = getAvg();
        const maxVal = Math.max(...recent.map(i=>i.amt), avg * 2, 50);
        const chart = document.getElementById('chartContainer');
        const avgPos = (avg / maxVal) * 100;
        chart.innerHTML = `<div class="avg-line" style="bottom: ${avgPos}%;"><span class="avg-label">AVG ${avg.toFixed(0)}ℓ</span></div>`;
        recent.forEach(item => {
            const h = (item.amt / maxVal) * 100;
            chart.innerHTML += `<div class="bar ${item.amt > avg * 1.5 ? 'over' : ''}" style="height:${Math.max(2, h)}%"></div>`;
        });
        let sumHTML = "";
        Object.keys(d.logs).sort().reverse().forEach(key => {
            sumHTML += `<div class="summary-card"><span class="summary-date">${key}</span><div><span class="summary-val" style="margin-right:15px;">${d.logs[key]}ℓ</span><button class="btn-del-mini" onclick="delMonth('${key}')">消去</button></div></div>`;
        });
        document.getElementById('monthlySummaryArea').innerHTML = sumHTML || 'NO DATA';
        document.getElementById('modalOverlay').style.display='flex';
    }
    function closeDetail() { document.getElementById('modalOverlay').style.display='none'; }

    let longTimer;
    const rb = document.getElementById('resetBtn');
    rb.addEventListener('touchstart', (e) => { longTimer = setTimeout(() => { if(confirm("全履歴を消去しますか？")){ d.used=0; d.history=[]; d.logs={}; up(); } }, 1000); });
    rb.addEventListener('touchend', () => clearTimeout(longTimer));
    up();
</script>
</body>
</html>
