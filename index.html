<button class="btn-save" id="saveBtn" onclick="save()" style="display: block; width: 100%; touch-action: manipulation;">記録を保存</button>

<script>
    function up() {
        // ...既存の処理...
        
        // 保存ボタンの状態更新
        const saveBtn = document.getElementById('saveBtn');
        if (d.in > 0) {
            saveBtn.innerText = `${d.in}ℓ の使用を記録`;
            saveBtn.style.opacity = "1";
            saveBtn.style.pointerEvents = "auto"; // 反応するようにする
        } else {
            saveBtn.innerText = '数値を入力してください';
            saveBtn.style.opacity = "0.3";
            saveBtn.style.pointerEvents = "none"; // 0の時は押せないようにする
        }
        
        // ...既存の保存処理...
    }

    function save() { 
        if (!d.ppm) { alert("先にPPMを入力してください"); return; }
        // すでにup()で制御していますが、念のため
        if (d.in === 0) return;

        const monthKey = `${new Date().getFullYear()}-${String(new Date().getMonth() + 1).padStart(2, '0')}`;
        d.used += d.in; 
        d.logs[monthKey] = (d.logs[monthKey] || 0) + d.in;
        d.in = 0; 
        up();
        // 保存したことがわかるように一瞬ボタンを光らせるなどの演出も可能です
    }
</script>
