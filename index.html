<div class="input-box">
    <div class="input-title">今回の洗車使用量</div>
    <div class="counter-row">
        <button class="btn-round" onclick="add(-1)">−</button>
        <div class="current-disp">
            <span id="inVal">0</span><span style="font-size:24px; margin-left:4px; color:var(--text-sub);">ℓ</span>
        </div>
        <button class="btn-round" onclick="add(1)">＋</button>
    </div>
    
    <div style="text-align:center; margin-bottom:20px;">
        <button onclick="clr()" style="background:#3a3a3c; color:var(--text-sub); border:none; padding:5px 15px; border-radius:12px; font-size:11px;">数値をリセット</button>
    </div>

    <div class="quick-grid">
        <button class="btn-q" onclick="add(5)">+5ℓ</button>
        <button class="btn-q" onclick="add(10)">+10ℓ</button>
        <button class="btn-q" onclick="add(20)">+20ℓ</button>
        <button class="btn-q" onclick="add(30)">+30ℓ</button>
        <button class="btn-q" onclick="add(50)">+50ℓ</button>
        <button class="btn-q" onclick="add(100)">+100ℓ</button>
    </div>
</div>

<script>
    // 追加されたクリア関数
    function clr() { 
        d.in = 0; 
        up(); 
    }
    
    // 既存のadd関数も維持
    function add(v) { 
        d.in = Math.max(0, d.in + v); 
        up(); 
    }
</script>
