<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>pure-water-tracker</title>
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #1c1c1e;
            --accent-green: #32d74b;
            --accent-red: #ff453a;
            --text-main: #ffffff;
            --text-sub: #8e8e93;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color); color: var(--text-main);
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center;
        }
        .app-container { width: 100%; max-width: 375px; }

        /* 上部：タイトルとメイン数値 */
        .top-meta { font-size: 13px; color: var(--text-sub); text-align: center; margin-top: 10px; }
        .header-section { text-align: center; margin: 30px 0 20px; }
        .label-xs { font-size: 10px; color: var(--text-sub); margin-bottom: 5px; }
        .main-display { font-size: 64px; font-weight: 800; line-height: 1; letter-spacing: -1px; }
        .unit-l { font-size: 32px; font-weight: 400; margin-left: 2px; }
        .progress-bar { height: 6px; background: var(--accent-green); width: 100%; border-radius: 3px; margin: 20px 0; }
        
        .sub-info { display: flex; justify-content: space-around; font-size: 12px; color: var(--text-sub); }

        /* 数値カード（タップでポップアップ） */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 20px 0 8px; }
        .stat-card { background: var(--card-bg); padding: 15px; border-radius: 12px; text-align: center; cursor: pointer; }
        .stat-card:active { background: #2c2c2e; }
        .full-card { background: var(--card-bg); padding: 15px; border-radius: 12px; text-align: center; margin-bottom: 25px; }

        /* カウンター：写真の - 0ℓ + */
        .input-area { background: var(--card-bg); padding: 25px; border-radius: 20px; margin-bottom: 12px; }
        .counter-row { display: flex; justify-content: center; align-items: center; gap: 40px; margin-bottom: 25px; }
        .btn-circle { width: 48px; height: 48px; border-radius: 50%; border: none; background: #3a3a3c; color: white; font-size: 24px; cursor: pointer; }
        .current-val { font-size: 52px; font-weight: bold; color: var(--accent-green); font-style: italic; }
        
        .quick-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .btn-q { background: #2c2c2e; border: none; padding: 12px; border-radius: 8px; color: white; font-size: 13px; font-weight: 600; }

        /* アクションボタン */
        .btn-save { width: 100%; background: var(--accent-green); color: black; padding: 18px; border-radius: 16px; border: none; font-size: 18px; font-weight: bold; margin-bottom: 12px; }
        .btn-reset { width: 100%; background: none; border: 1px solid var(--accent-red); color: var(--accent-red); padding: 12px; border-radius: 10px; font-size: 11px; }

        /* 設定エリア */
        .settings-card { background: var(--card-bg); padding: 20px; border-radius: 20px; margin-top: 30px; }
        .setting-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #2c2c2e; }
        .mode-row { display: flex; gap: 8px; margin-top: 15px; }
        .btn-m { flex: 1; background: #2c2c2e; border: none; padding: 12px; border-radius: 10px; color: #666; font-weight: bold; }
        .btn-m.active { background: var(--accent-green); color: white; }

        /* 詳細ポップアップ（モーダル） */
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; }
        .modal-body { background: var(--card-bg); width: 85%; padding: 25px; border-radius: 20px; border: 1px solid #333; }
        .modal-close { width: 100%; background: var(--accent-green); border: none; padding: 12px; border-radius: 10px; color: black; font-weight: bold; margin-top: 20px; }

        .footer { text-align: center; font-size: 10px; color: #555; margin-top: 50px; line-height: 1.8; padding-bottom: 100px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="top-meta">pure-water-tracker</div>
    
    <div class="header-section">
        <div class="label-xs">交換まであと</div>
        <div class="main-display" id="remainL">2000<span class="unit-l">ℓ</span></div>
        <div class="progress-bar"></div>
        <div class="sub-info">
            <span>目安：<span id="remainCount">66</span> 回</span>
            <span>寿命予測：7/18頃(仮)</span>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card" onclick="showPopup('使用量履歴', '4月の累計: 0ℓ<br>3月の累計: 120ℓ')">
            <span class="label-xs">累計使用量</span><div id="totalUsed">0 ℓ</div>
        </div>
        <div class="stat-card" onclick="showPopup('月別詳細', '今月は4回の洗車を記録しています。')">
            <span class="label-xs">04月の使用量</span><div>0 ℓ</div>
        </div>
    </div>
    <div class="full-card" onclick="showPopup('コスト計算', '単価 6.8円/ℓ で算出しています。')">
        <span class="label-xs">今月の算出コスト</span><div>0 円</div>
    </div>

    <div class="input-area">
        <div class="counter-row">
            <button class="btn-circle" onclick="changeIn(-1)">−</button>
            <div class="current-val"><span id="inputVal">0</span><span style="font-size:24px; margin-left:2px;">ℓ</span></div>
            <button class="btn-circle" onclick="changeIn(1)">＋</button>
        </div>
        <div class="quick-grid">
            <button class="btn-q" onclick="changeIn(5)">+5ℓ</button>
            <button class="btn-q" onclick="changeIn(10)">+10ℓ</button>
            <button class="btn-q" onclick="changeIn(20)">+20ℓ</button>
            <button class="btn-q" onclick="changeIn(30)">+30ℓ</button>
            <button class="btn-q" onclick="changeIn(50)">+50ℓ</button>
            <button class="btn-q" onclick="changeIn(100)">+100ℓ</button>
        </div>
    </div>

    <button class="btn-save" onclick="save()">記録を保存</button>
    <button class="btn-reset">長押しで樹脂リセット</button>

    <div class="settings-card">
        <div class="setting-item" onclick="promptPPM()">
            <span class="label-xs" style="color:#fff; font-size:12px;">水道水硬度 (ppm)</span>
            <span id="dispPPM" style="color:var(--accent-green); font-weight:bold;">70</span>
        </div>
        <div class="mode-row">
            <button id="mPRO" class="btn-m" onclick="setM('PRO')">PRO</button>
            <button id="mJUST" class="btn-m" onclick="setM('JUST')">JUST</button>
        </div>
    </div>

    <div class="footer">
        Reference<br>監修：ビューティフルカーズ / 製造：グリーンライフ<br>
        Information<br>本アプリは「ピュアニッシュ PRO / JUST」の仕様を参考にした個人開発の非公式管理ツールです。<br>
        <hr style="border:0; border-top:1px solid #222; margin:15px 0;">
        Version 1.0.0<br>
        © 2026 missing link. All rights reserved.
    </div>
</div>

<div id="modal" class="modal">
    <div class="modal-body">
        <div id="modalTitle" style="font-weight:bold; margin-bottom:15px; border-bottom:1px solid #333; padding-bottom:10px;"></div>
        <div id="modalText" style="font-size:14px; line-height:1.6;"></div>
        <button class="modal-close" onclick="closePopup()">閉じる</button>
    </div>
</div>

<script>
    let state = { ppm: 70, mode: 'PRO', used: 0, input: 0 };
    function update() {
        const cap = (state.mode === 'PRO' ? 180000 : 90000) / state.ppm;
        const rem = Math.max(0, cap - state.used);
        document.getElementById('remainL').innerHTML = Math.floor(rem) + '<span class="unit-l">ℓ</span>';
        document.getElementById('remainCount').innerText = Math.floor(rem / 30);
        document.getElementById('totalUsed').innerText = state.used + ' ℓ';
        document.getElementById('inputVal').innerText = state.input;
        document.getElementById('dispPPM').innerText = state.ppm;
        document.getElementById('mPRO').className = state.mode === 'PRO' ? 'btn-m active' : 'btn-m';
        document.getElementById('mJUST').className = state.mode === 'JUST' ? 'btn-m active' : 'btn-m';
    }
    function changeIn(v) { state.input = Math.max(0, state.input + v); update(); }
    function setM(m) { state.mode = m; update(); }
    function promptPPM() { const p = prompt("硬度を入力", state.ppm); if(p) { state.ppm = p; update(); } }
    function showPopup(t, txt) { 
        document.getElementById('modalTitle').innerText = t;
        document.getElementById('modalText').innerHTML = txt;
        document.getElementById('modal').style.display = 'flex';
    }
    function closePopup() { document.getElementById('modal').style.display = 'none'; }
    function save() { state.used += state.input; state.input = 0; update(); alert("保存完了"); }
    update();
</script>
</body>
</html>
