<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PURE WATER TRACKER</title>
    <style>
        :root {
            --bg-color: #0c0c0c;
            --card-bg: #1c1c1e;
            --accent-green: #34c759;
            --accent-yellow: #ffcc00;
            --accent-red: #ff453a;
            --accent-blue: #0a84ff;
            --text-main: #ffffff;
            --text-sub: #8e8e93;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; touch-action: manipulation; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; transition: background-color 0.8s ease; }
        body.alert-red { background-color: #2a0a0a; }
        .container { width: 100%; max-width: 380px; }

        /* メインタイトルのブラッシュアップ */
        .top-title { font-size: 18px; font-weight: 900; color: var(--text-main); text-align: center; margin-bottom: 2px; letter-spacing: 2.5px; text-transform: uppercase; }
        .top-title span { color: var(--accent-blue); }
        .top-sub { font-size: 9px; color: var(--text-sub); text-align: center; margin-bottom: 25px; font-weight: 500; letter-spacing: 1px; }
        
        .header-section { text-align: center; margin-bottom: 20px; padding: 20px 10px; border-radius: 24px; min-height: 190px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .label-xs { font-size: 10px; color: var(--text-sub); margin-bottom: 8px; }
        
        /* 3ステップガイド */
        .tutorial-box { background: rgba(10, 132, 255, 0.05); border: 1px dashed rgba(10, 132, 255, 0.5); padding: 25px 20px; border-radius: 24px; width: 100%; text-align: left; }
        .step-row { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; font-size: 13px; color: #fff; font-weight: 600; }
        .step-num { background: var(--accent-blue); color: #fff; font-size: 10px; font-weight: 900; padding: 2px 6px; border-radius: 4px; flex-shrink: 0; }
        .step-active { color: var(--accent-yellow); font-weight: 800; border-bottom: 1px solid var(--accent-yellow); padding-bottom: 1px; }
        .step-row:last-child { margin-bottom: 0; }

        .main-val-wrap { position: relative; display: inline-block; margin-bottom: 15px; cursor: pointer; }
        .main-val { font-size: 64px; font-weight: 800; line-height: 1; transition: color 0.3s; }
        .unit-l { font-size: 32px; font-weight: 400; margin-left: 4px; }
        
        .btn-detail { background: none; border: 1px solid #3a3a3c; color: var(--text-sub); padding: 8px 16px; border-radius: 20px; font-size: 11px; cursor: pointer; transition: all 0.2s; margin-bottom: 10px; }
        .sub-stats { display: flex; justify-content: space-around; font-size: 11px; color: var(--text-sub); margin-bottom: 25px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .card { background: var(--card-bg); padding: 15px; border-radius: 12px; text-align: center; }
        .card-full { background: var(--card-bg); padding: 15px; border-radius: 12px; text-align: center; margin-bottom: 25px; }
        
        .input-box { background: var(--card-bg); padding: 25px 20px; border-radius: 20px; margin-bottom: 15px; }
        .input-title { font-size: 11px; color: var(--accent-green); font-weight: bold; text-align: center; margin-bottom: 15px; }
        .counter-row { display: flex; justify-content: center; align-items: center; gap: 40px; margin-bottom: 15px; }
        .btn-round { width: 50px; height: 50px; border-radius: 50%; border: none; background: #3a3a3c; color: white; font-size: 26px; cursor: pointer; }
        .current-disp { font-size: 52px; font-weight: bold; }
        .btn-clear { background: #3a3a3c; color: var(--text-sub); border: none; padding: 6px 16px; border-radius: 20px; font-size: 11px; cursor: pointer; display: block; margin: 0 auto 20px; }
        
        .quick-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .btn-q { background: #2c2c2e; border: none; padding: 14px 5px; border-radius: 10px; color: white; font-weight: 600; font-size: 12px; cursor: pointer; }
        
        .btn-save { width: 100%; display: block; background: var(--accent-green); color: white; padding: 22px; border-radius: 18px; border: none; font-size: 16px; font-weight: bold; margin-bottom: 15px; cursor: pointer; transition: all 0.1s; }
        .btn-save:active { transform: scale(0.97); opacity: 0.9; }
        .btn-reset { width: 100%; background: none; border: 1px solid var(--accent-red); color: var(--accent-red); padding: 12px; border-radius: 12px; font-size: 11px; margin-bottom: 25px; cursor: pointer; }
        
        .settings-box { background: var(--card-bg); padding: 25px 20px; border-radius: 20px; margin-top: 10px; }
        .setting-item { display: flex; justify-content: space-between; align-items: flex-end; padding: 12px 0; border-bottom: 1px solid #2c2c2e; margin-bottom: 10px; }
        .setting-label-wrap { display: flex; flex-direction: column; gap: 4px; }
        .ppm-guide-txt { font-size: 9px; color: var(--accent-yellow); font-weight: 400; }
        .ppm-input { background: none; border: none; color: var(--accent-green); font-weight: bold; font-size: 18px; text-align: right; width: 80px; }
        .mode-row { display: flex; gap: 8px; margin-top: 5px; }
        .btn-m { flex: 1; background: #2c2c2e; border: none; padding: 12px; border-radius: 10px; color: #666; font-weight: bold; cursor: pointer; font-size: 13px; }
        .btn-m.active { border: 1px solid var(--accent-green); color: var(--accent-green); }

        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); display:none; justify-content:center; align-items:center; z-index:1000; padding:20px; }
        .modal-content { background: #1c1c1e; width:100%; max-width:350px; border-radius:24px; padding:25px; border: 1px solid #3a3a3c; }
        .modal-h { font-size: 18px; font-weight: bold; margin-bottom: 20px; color: var(--accent-blue); text-align: center; }
        .btn-close { width:100%; background: #3a3a3c; border:none; color:white; padding:12px; border-radius:12px; margin-top:10px; font-weight:bold; }
        
        .footer { text-align: center; font-size: 10px; color: #555; margin-top: 50px; padding-bottom: 50px; }
        .info-text { font-size: 9px; color: #444; text-align: center; margin-top: 40px; line-height: 1.6; }
    </style>
</head>
<body>

<div class="container">
    <div class="top-title">PURE WATER <span>TRACKER.</span></div>
    <div class="top-sub">ULTIMATE RESIN MANAGEMENT TOOL</div>

    <div class="header-section" id="headerSection"></div>

    <div class="sub-stats"><span>洗車回数：あと <span id="remCount">--</span> 回分</span><span id="predictDate">寿命予測：--/--頃</span></div>

    <div class="stats-grid">
        <div class="card"><div class="label-xs">累計使用量</div><div id="totalUsed">0 ℓ</div></div>
        <div class="card"><div class="label-xs">今月の使用量</div><div id="monthUsed">0 ℓ</div></div>
    </div>
    <div class="card-full"><div class="label-xs">今月の算出コスト</div><div id="costDisp">0 円</div></div>

    <div class="input-box">
        <div class="input-title">今回の洗車使用量</div>
        <div class="counter-row">
            <button class="btn-round" onclick="add(-1)">−</button>
            <div class="current-disp"><span id="inVal">0</span><span style="font-size:24px; margin-left:4px; color:var(--text-sub);">ℓ</span></div>
            <button class="btn-round" onclick="add(1)">＋</button>
        </div>
        <button class="btn-clear" onclick="clr()">入力をリセット</button>
        <div class="quick-grid">
            <button class="btn-q" onclick="add(5)">+5ℓ</button><button class="btn-q" onclick="add(10)">+10ℓ</button><button class="btn-q" onclick="add(20)">+20ℓ</button>
            <button class="btn-q" onclick="add(30)">+30ℓ</button><button class="btn-q" onclick="add(50)">+50ℓ</button><button class="btn-q" onclick="add(100)">+100ℓ</button>
        </div>
    </div>

    <button class="btn-save" id="saveBtn" onclick="save()">数値を入力してください</button>
    <button id="resetBtn" class="btn-reset">長押しで樹脂リセット</button>
    
    <div class="settings-box">
        <div class="input-title" style="margin-bottom:20px;">設定</div>
        <div class="setting-item">
            <div class="setting-label-wrap">
                <span class="label-xs" style="color:#fff; font-size:12px; margin-bottom:0;">STEP1：水道水硬度 (ppm)</span>
                <span class="ppm-guide-txt">※水質が寿命を決定します</span>
            </div>
            <input type="number" id="ppmIn" class="ppm-input" placeholder="0" oninput="setPPM(this.value)" pattern="\d*">
        </div>
        <div class="mode-row">
            <button id="mPRO" class="btn-m" onclick="mode('PRO')">PRO (3個)</button>
            <button id="mJUST" class="btn-m" onclick="mode('JUST')">JUST (2個)</button>
        </div>
    </div>

    <div class="info-text">DESIGNED FOR BEAUTIFUL CARS ENTHUSIASTS<br>© 2026 missing link.</div>
    <div class="footer">Version 1.0.2</div>
</div>

<div id="modalOverlay" class="modal-overlay" onclick="closeDetail()"><div class="modal-content" onclick="event.stopPropagation()"><div class="modal-h">履歴・詳細</div><div id="historyList" style="max-height: 300px; overflow-y: auto;"></div><button class="btn-close" onclick="closeDetail()">閉じる</button></div></div>

<script>
    const STORAGE_KEY = 'pwMasterV4';
    let d = JSON.parse(localStorage.getItem(STORAGE_KEY)) || { ppm: null, m: 'PRO', used: 0, in: 0, logs: {}, history: [] };

    function up() {
        const header = document.getElementById('headerSection');
        const saveBtn = document.getElementById('saveBtn');
        const now = new Date(), monthKey = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
        const resinPrice = (d.m === 'PRO' ? 12980 : 9878);

        if (!d.ppm) {
            header.innerHTML = `
                <div class="tutorial-box">
                    <div class="step-row"><span class="step-num">STEP 1</span> <span class="step-active">PPMを入力</span></div>
                    <div class="step-row"><span class="step-num">STEP 2</span> <span>洗車ごとに使用量を記録</span></div>
                    <div class="step-row"><span class="step-num">STEP 3</span> <span>寿命とコストを自動管理</span></div>
                </div>
            `;
            document.getElementById('remCount').innerText = "--";
            document.getElementById('predictDate').innerText = "寿命予測：--/--頃";
            document.getElementById('costDisp').innerText = "0 円";
        } else {
            const cap = (d.m === 'PRO' ? 180000 : 90000) / d.ppm;
            const rem = Math.max(0, cap - d.used);
            const avg = d.history.length > 0 ? Math.round(d.history.slice(0,5).reduce((a,b)=>a+b.amt,0)/d.history.slice(0,5).length) : 30;
            
            header.innerHTML = `
                <div class="label-xs">交換まであと</div>
                <div class="main-val-wrap" onclick="showDetail()">
                    <span class="main-val" id="remDisplay">${Math.floor(rem)}<span class="unit-l">ℓ</span></span>
                </div>
                <button class="btn-detail" onclick="showDetail()">履歴・分析を表示</button>
            `;
            const remDisp = document.getElementById('remDisplay');
            if (rem/cap < 0.1) remDisp.style.color = 'var(--accent-red)';
            else if (rem/cap < 0.3) remDisp.style.color = 'var(--accent-yellow)';
            else remDisp.style.color = 'var(--accent-green)';

            document.getElementById('remCount').innerText = Math.floor(rem / avg);
            document.getElementById('costDisp').innerText = Math.round(((d.logs[monthKey]||0)/cap)*resinPrice).toLocaleString() + ' 円';
            
            const daysRem = Math.floor((rem/avg)*7); const t = new Date(); t.setDate(now.getDate()+daysRem);
            document.getElementById('predictDate').innerText = `寿命予測：${t.getMonth()+1}/${t.getDate()}頃`;
        }

        if (d.ppm !== null) document.getElementById('ppmIn').value = d.ppm;
        document.getElementById('totalUsed').innerText = d.used + ' ℓ';
        document.getElementById('monthUsed').innerText = (d.logs[monthKey]||0) + ' ℓ';
        document.getElementById('inVal').innerText = d.in;
        saveBtn.innerText = d.in > 0 ? `${d.in}ℓ の使用を記録` : '数値を入力してください';
        saveBtn.style.opacity = (d.in > 0 && d.ppm) ? "1" : "0.3";
        saveBtn.style.pointerEvents = (d.in > 0 && d.ppm) ? "auto" : "none";
        document.getElementById('mPRO').className = d.m === 'PRO' ? 'btn-m active' : 'btn-m';
        document.getElementById('mJUST').className = d.m === 'JUST' ? 'btn-m active' : 'btn-m';
        localStorage.setItem(STORAGE_KEY, JSON.stringify(d));
    }

    function setPPM(v) { d.ppm = v===""?null:parseInt(v); up(); }
    function add(v) { d.in = Math.max(0, d.in+v); up(); }
    function clr() { d.in=0; up(); }
    function mode(m) { d.m=m; up(); }
    function save() {
        if (!d.ppm || d.in <= 0) return;
        const now = new Date();
        const monthKey = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2, '0')}`;
        d.history.unshift({ ts: now.getTime(), date: `${now.getMonth()+1}/${now.getDate()}`, amt: d.in });
        d.used += d.in; d.logs[monthKey] = (d.logs[monthKey]||0) + d.in;
        d.in = 0; up();
    }
    
    let longTimer;
    const rb = document.getElementById('resetBtn');
    rb.addEventListener('touchstart', (e) => { e.preventDefault(); longTimer = setTimeout(() => { if(confirm("樹脂記録をリセット？")){ d.used=0; up(); } }, 1000); });
    rb.addEventListener('touchend', () => { clearTimeout(longTimer); });
    function showDetail() { document.getElementById('modalOverlay').style.display='flex'; }
    function closeDetail() { document.getElementById('modalOverlay').style.display='none'; }

    up();
</script>
</body>
</html>
