<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PURE-WATER-TRACKER</title>
    
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        /* * =========================================
         * BASE STYLES & RESET
         * =========================================
         */
        :root {
            --bg-color: #000000;
            --card-bg: rgba(255, 255, 255, 0.03);
            --accent-blue: #3b82f6;
            --accent-green: #22c55e;
            --text-main: #ffffff;
            --text-muted: #6b7280;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            user-select: none;
        }

        /* * =========================================
         * LAYOUT & CONTAINERS
         * =========================================
         */
        .app-container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* * =========================================
         * COMPONENTS: GLASS-CARD
         * =========================================
         */
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            transition: transform 0.2s ease, background 0.2s ease;
        }

        /* * =========================================
         * COMPONENTS: STEP GUIDE
         * =========================================
         */
        .step-guide-box {
            border: 1px solid #1e40af;
            background: rgba(30, 64, 175, 0.08);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .step-unit {
            margin-bottom: 18px;
        }

        .step-unit:last-child {
            margin-bottom: 0;
        }

        .step-label {
            color: #3b82f6;
            font-size: 0.75rem;
            font-weight: 900;
            letter-spacing: 0.05em;
            display: block;
            margin-bottom: 4px;
        }

        .step-text {
            color: #9ca3af;
            font-size: 0.8125rem;
            font-weight: 500;
            line-height: 1.6;
        }

        /* * =========================================
         * COMPONENTS: MAIN STATUS
         * =========================================
         */
        .main-display-section {
            text-align: center;
            padding: 20px 0 40px;
        }

        .status-caption {
            color: var(--text-muted);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .ppm-trigger-box {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: opacity 0.1s ease;
        }

        .ppm-trigger-box:active {
            opacity: 0.6;
            transform: scale(0.98);
        }

        .main-value-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .main-value-text {
            font-size: 2.75rem;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .detail-badge {
            margin-left: 14px;
            background: #1c1c1e;
            color: #8e8e93;
            font-size: 10px;
            font-weight: 700;
            padding: 6px 12px;
            border-radius: 100px;
            border: 1px solid #333;
            white-space: nowrap;
        }

        /* * =========================================
         * COMPONENTS: DATA GRID
         * =========================================
         */
        .data-grid-sub {
            display: flex;
            justify-content: space-around;
            margin-bottom: 24px;
            padding: 0 10px;
        }

        .sub-info-item {
            font-size: 11px;
            font-weight: 700;
            color: #555;
        }

        .sub-info-val {
            color: #888;
        }

        /* * =========================================
         * COMPONENTS: INPUT AREA
         * =========================================
         */
        .input-section-title {
            color: var(--accent-green);
            font-size: 13px;
            font-weight: 900;
            text-align: center;
            letter-spacing: 0.15em;
            margin-bottom: 24px;
            text-transform: uppercase;
        }

        .form-group {
            margin-bottom: 30px;
        }

        .form-label {
            display: block;
            text-align: center;
            color: var(--text-muted);
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.2em;
            margin-bottom: 12px;
            text-transform: uppercase;
        }

        .input-dark-master {
            background: #0a0a0a;
            border: 1px solid #222;
            color: #fff;
            width: 100%;
            border-radius: 16px;
            padding: 18px;
            font-size: 1.5rem;
            font-weight: 600;
            text-align: center;
            outline: none;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .input-dark-master:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        /* * =========================================
         * COMPONENTS: COUNTER
         * =========================================
         */
        .counter-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding: 0 10px;
        }

        .btn-round {
            width: 64px;
            height: 64px;
            border-radius: 100px;
            border: 1px solid #333;
            background: transparent;
            color: #aaa;
            font-size: 1.75rem;
            font-weight: 300;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-round:active {
            background: #222;
            transform: scale(0.9);
            border-color: #555;
        }

        .counter-value-display {
            display: flex;
            align-items: baseline;
        }

        .counter-num {
            font-size: 4rem;
            font-weight: 200;
            letter-spacing: -0.05em;
        }

        .counter-unit {
            font-size: 1.5rem;
            color: #444;
            margin-left: 8px;
            font-weight: 300;
        }

        /* * =========================================
         * COMPONENTS: RESET BUTTON
         * =========================================
         */
        .btn-reset-full {
            width: 100%;
            background: #111;
            border: 1px solid #222;
            color: #555;
            padding: 18px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 900;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-reset-full:active {
            background: #000;
            color: #333;
            transform: scale(0.98);
        }

        /* * =========================================
         * COMPONENTS: CUSTOM MODAL (ALERTS)
         * =========================================
         */
        .modal-overlay {
            display: none; /* Initial state */
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .modal-window {
            background: #1c1c1e;
            width: 100%;
            max-width: 320px;
            border-radius: 24px;
            overflow: hidden;
            animation: modalShow 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes modalShow {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .modal-content {
            padding: 36px 24px;
            text-align: center;
        }

        .modal-text {
            color: #fff;
            font-size: 1.125rem;
            font-weight: 600;
            line-height: 1.5;
        }

        .modal-action-btn {
            width: 100%;
            padding: 20px;
            background: transparent;
            border: none;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            color: #0a84ff;
            font-size: 1.125rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
        }

        .modal-action-btn:active {
            background: rgba(255, 255, 255, 0.05);
        }

    </style>
</head>
<body>

    <div class="app-container">
        
        <header class="flex justify-center py-8">
            <h1 class="text-[21px] font-black tracking-[0.3em] text-gray-600 uppercase">
                PURE-WATER-TRACKER
            </h1>
        </header>

        <section class="step-guide-box">
            <div class="step-unit">
                <span class="step-label">STEP 1: 準備</span>
                <p class="step-description">まずは下の「水道水硬度」にPPMを入力してください。</p>
            </div>
            <div class="step-unit">
                <span class="step-label">STEP 2: 記録</span>
                <p class="step-description">洗車が終わったら、使用量を「＋」で入力して保存します。</p>
            </div>
            <div class="step-unit">
                <span class="step-label">STEP 3: 管理</span>
                <p class="step-description">寿命予測やコストが自動で算出されます。</p>
            </div>
        </section>

        <div class="main-display-section">
            <p class="status-caption text-gray-500">交換まであと</p>
            <div id="triggerPpmModal" class="ppm-trigger-box" onclick="uiActions.handleMainStatusClick()">
                <div class="main-value-wrap">
                    <span id="mainPpmLabel" class="main-value-text text-white">PPMを入力</span>
                    <span class="detail-badge">コンディション詳細</span>
                </div>
            </div>
        </div>

        <div class="data-grid-sub">
            <span class="sub-info-item uppercase">洗車回数：あと <span id="uiRemainingWashes" class="sub-info-val">--</span> 回分</span>
            <span class="sub-info-item uppercase">寿命予測：<span id="uiExpiryDate" class="sub-info-val">--/--頃</span></span>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-4">
            <div class="glass-card flex flex-col items-center justify-center py-6">
                <span class="text-[10px] font-black text-gray-600 tracking-widest uppercase mb-2">累計使用量</span>
                <div class="flex items-baseline">
                    <span id="uiTotalUsage" class="text-2xl font-bold text-white">0</span>
                    <span class="text-sm text-gray-600 ml-1">ℓ</span>
                </div>
            </div>
            <div class="glass-card flex flex-col items-center justify-center py-6">
                <span class="text-[10px] font-black text-gray-600 tracking-widest uppercase mb-2">今月の使用量</span>
                <div class="flex items-baseline">
                    <span id="uiMonthlyUsage" class="text-2xl font-bold text-white">0</span>
                    <span class="text-sm text-gray-600 ml-1">ℓ</span>
                </div>
            </div>
        </div>

        <div class="glass-card flex flex-col items-center justify-center py-6 mb-10">
            <span class="text-[10px] font-black text-gray-600 tracking-widest uppercase mb-2">今月の算出コスト</span>
            <div class="flex items-baseline">
                <span id="uiMonthlyCost" class="text-2xl font-bold text-white">0</span>
                <span class="text-sm text-gray-500 ml-2">円</span>
            </div>
        </div>

        <section class="glass-card border-t border-white/10 pt-8">
            <h3 class="input-section-title">今回の洗車使用量</h3>
            
            <div class="form-group">
                <label for="ppmInput" class="form-label">水道水硬度 (PPM)</label>
                <input type="number" id="ppmInput" class="input-dark-master" placeholder="0" oninput="logic.syncPpm()">
            </div>

            <div class="counter-container">
                <button class="btn-round" onclick="logic.updateLocalUsage(-10)">－</button>
                <div class="counter-value-display">
                    <span id="uiLocalUsage" class="counter-num text-white font-extralight">0</span>
                    <span class="counter-unit">ℓ</span>
                </div>
                <button class="btn-round" onclick="logic.updateLocalUsage(10)">＋</button>
            </div>

            <button class="btn-reset-full" onclick="logic.fullReset()">
                入力をリセット
            </button>
        </section>

    </div>

    <div id="modalOverlay" class="modal-overlay">
        <div class="modal-window">
            <div class="modal-content">
                <p id="modalMessage" class="modal-text">
                    下記の設定欄にppmを入力
                </p>
            </div>
            <button class="modal-action-btn" onclick="uiActions.closeModal()">
                閉じる
            </button>
        </div>
    </div>

    <script>
        /**
         * State Management Object
         * Pure Water Tracker System State
         */
        const state = {
            ppm: 0,
            localUsage: 0,
            totalUsage: 0,
            monthlyUsage: 0,
            costPerLiter: 0, // Calculated based on resin life
            resinCapacity: 1800 // Example constant for resin life in liter*ppm
        };

        /**
         * UI Actions & Modal Handlers
         */
        const uiActions = {
            /**
             * Handles clicks on the main "PPMを入力" display
             */
            handleMainStatusClick: function() {
                const currentPpm = document.getElementById('ppmInput').value;
                if (!currentPpm || currentPpm <= 0) {
                    this.openModal();
                } else {
                    console.log("PPM is set. Details would be shown here.");
                }
            },

            openModal: function() {
                const modal = document.getElementById('modalOverlay');
                modal.style.display = 'flex';
            },

            closeModal: function() {
                const modal = document.getElementById('modalOverlay');
                modal.style.display = 'none';
            }
        };

        /**
         * Core Logic & Data Processing
         */
        const logic = {
            /**
             * Syncs the input PPM with the main display
             */
            syncPpm: function() {
                const input = document.getElementById('ppmInput');
                const display = document.getElementById('mainPpmLabel');
                const val = input.value;

                state.ppm = val;

                if (val && val > 0) {
                    display.innerText = val + " PPM";
                    display.style.color = "#3b82f6"; // Primary Blue
                } else {
                    display.innerText = "PPMを入力";
                    display.style.color = "#ffffff";
                }

                this.calculatePredictions();
            },

            /**
             * Updates the local wash usage counter
             */
            updateLocalUsage: function(amount) {
                state.localUsage += amount;
                if (state.localUsage < 0) state.localUsage = 0;
                
                document.getElementById('uiLocalUsage').innerText = state.localUsage;
            },

            /**
             * Resets all input values and state
             */
            fullReset: function() {
                state.ppm = 0;
                state.localUsage = 0;

                // Reset UI Elements
                document.getElementById('ppmInput').value = "";
                document.getElementById('uiLocalUsage').innerText = "0";
                
                const mainLabel = document.getElementById('mainPpmLabel');
                mainLabel.innerText = "PPMを入力";
                mainLabel.style.color = "#ffffff";

                this.calculatePredictions();
            },

            /**
             * Advanced Calculation Logic for Life Prediction
             * (Maintained as placeholder for future expansion)
             */
            calculatePredictions: function() {
                const remainingWashesUi = document.getElementById('uiRemainingWashes');
                const expiryDateUi = document.getElementById('uiExpiryDate');

                if (state.ppm > 0) {
                    // Logic for estimation goes here
                    // Keeping placeholders as per user's original structure
                    remainingWashesUi.innerText = "--"; 
                    expiryDateUi.innerText = "--/--頃";
                } else {
                    remainingWashesUi.innerText = "--";
                    expiryDateUi.innerText = "--/--頃";
                }
            }
        };

        /**
         * INITIALIZATION
         * Runs when DOM is ready
         */
        document.addEventListener('DOMContentLoaded', () => {
            console.log("PURE-WATER-TRACKER Initialized.");
            // Prevent zooming on input focus for iOS
            document.addEventListener('gesturestart', function(e) {
                e.preventDefault();
            });
        });

    </script>
</body>
</html>
