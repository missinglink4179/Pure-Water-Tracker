<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>pure-water-tracker</title>
    <style>
        :root {
            --bg-color: #0c0c0c;
            --card-bg: #1c1c1e;
            --accent-green: #34c759;
            --accent-yellow: #ffcc00;
            --accent-red: #ff453a;
            --accent-blue: #0a84ff;
            --text-main: #ffffff;
            --text-sub: #8e8e93;
            --alert-deep-red: #2a0a0a;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; touch-action: manipulation; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; transition: background-color 0.8s ease; }
        
        body.alert-red { background-color: var(--alert-deep-red); }

        .container { width: 100%; max-width: 380px; }
        .top-title { font-size: 12px; color: var(--text-sub); text-align: center; margin-bottom: 25px; }
        
        .header-section { text-align: center; margin-bottom: 20px; padding: 20px 10px; border-radius: 24px; }
        .label-xs { font-size: 10px; color: var(--text-sub); margin-bottom: 8px; }
        
        .main-val-wrap { position: relative; display: inline-block; margin-bottom: 15px; cursor: pointer; }
        .main-val { font-size: 64px; font-weight: 800; line-height: 1; transition: color 0.3s; }
        .unit-l { font-size: 32px; font-weight: 400; margin-left: 4px; }
        .no-ppm-alert { font-size: 24px; color: var(--text-sub); font-weight: bold; }

        .main-val-wrap::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 0;
            width: 0%;
            height: 4px;
            background-color: var(--accent-blue);
            border-radius: 2px;
            transition: width 0s linear;
            opacity: 0;
        }
        .main-val-wrap.resetting .main-val { color: var(--accent-blue) !important; }
        .main-val-wrap.resetting::after { opacity: 1; }
        .main-val-wrap.reset-active::after { width: 100%; transition: width 1.0s linear; }

        .btn-detail { background: none; border: 1px solid #3a3a3c; color: var(--text-sub); padding: 8px 16px; border-radius: 20px; font-size: 11px; cursor: pointer; transition: all 0.2s; margin-bottom: 10px; }
        .sub-stats { display: flex; justify-content: space-around; font-size: 11px; color: var(--text-sub); margin-bottom: 25px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .card { background: var(--card-bg); padding: 15px; border-radius: 12px; text-align: center; }
        .card-full { background: var(--card-bg); padding: 15px; border-radius: 12px; text-align: center; margin-bottom: 25px; }
        
        .input-box { background: var(--card-bg); padding: 25px 20px; border-radius: 20px; margin-bottom: 15px; }
        .input-title { font-size: 11px; color: var(--accent-green); font-weight: bold; text-align: center; margin-bottom: 15px; }
        .counter-row { display: flex; justify-content: center; align-items: center; gap: 40px; margin-bottom: 15px; }
        .btn-round { width: 50px; height: 50px; border-radius: 50%; border: none; background: #3a3a3c; color: white; font-size: 26px; cursor: pointer; }
        .current-disp { font-size: 52px; font-weight: bold; }
        
        .btn-clear { background: #3a3a3c; color: var(--text-sub); border: none; padding: 6px 16px; border-radius: 20px; font-size: 11px; cursor: pointer; display: block; margin: 0 auto 20px; }
        .quick-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .btn-q { background: #2c2c2e; border: none; padding: 14px 5px; border-radius: 10px; color: white; font-weight: 600; font-size: 12px; cursor: pointer; touch-action: none; }
        
        .btn-save { width: 100%; display: block; background: var(--accent-green); color: white; padding: 22px; border-radius: 18px; border: none; font-size: 16px; font-weight: bold; margin-bottom: 15px; cursor: pointer; transition: all 0.1s; -webkit-appearance: none; touch-action: manipulation; }
        .btn-save:active { transform: scale(0.97); opacity: 0.9; }
        
        .btn-reset { width: 100%; background: none; border: 1px solid var(--accent-red); color: var(--accent-red); padding: 12px; border-radius: 12px; font-size: 11px; margin-bottom: 25px; user-select: none; cursor: pointer; touch-action: none; }
        
        .settings-box { background: var(--card-bg); padding: 20px; border-radius: 20px; margin-top: 10px; }
        .setting-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #2c2c2e; }
        .ppm-input { background: none; border: none; color: var(--accent-green); font-weight: bold; font-size: 16px; text-align: right; width: 80px; }
        .mode-row { display: flex; gap: 8px; margin-top: 15px; }
        .btn-m { flex: 1; background: #2c2c2e; border: none; padding: 12px; border-radius: 10px; color: #666; font-weight: bold; cursor: pointer; }
        .btn-m.active { border: 1px solid var(--accent-green); color: var(--accent-green); }
        
        .backup-section { margin-top: 25px; border-top: 1px dashed #3a3a3c; padding-top: 20px; }
        .backup-label { font-size: 11px; color: var(--accent-blue); font-weight: bold; text-align: center; margin-bottom: 10px; }
        .backup-guide { font-size: 9px; color: #666; line-height: 1.4; margin-bottom: 12px; background: rgba(0,0,0,0.2); padding: 8px; border-radius: 8px; }
        .backup-row { display: flex; gap: 8px; }
        .btn-b { flex: 1; background: #2c2c2e; border: 1px solid #3a3a3c; padding: 12px 5px; border-radius: 10px; color: #aaa; font-size: 10px; font-weight: bold; cursor: pointer; }

        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); display:none; justify-content:center; align-items:center; z-index:1000; padding:20px; }
        .modal-content { background: #1c1c1e; width:100%; max-width:350px; max-height:85vh; border-radius:24px; padding:25px; overflow-y:auto; border: 1px solid #3a3a3c; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .modal-h { font-size: 18px; font-weight: bold; margin-bottom: 20px; color: var(--accent-blue); text-align: center; }
        
        .modal-section { margin-bottom: 20px; }
        .modal-label-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .modal-label { font-size: 11px; color: var(--text-sub); border-left: 3px solid var(--accent-blue); padding-left: 8px; }
        .btn-mini-reset { background: none; border: 1px solid #444; color: #666; font-size: 9px; padding: 2px 8px; border-radius: 10px; cursor: pointer; }
        
        .history-item { position: relative; display: flex; flex-direction: column; padding: 12px 10px; border-bottom: 1px solid #2c2c2e; overflow: hidden; margin-bottom: 4px; border-radius: 8px; background: rgba(255,255,255,0.02); }
        .avg-guide-line { position: absolute; left: 50%; top: 0; bottom: 0; width: 1.5px; background: #ffffff; z-index: 2; opacity: 0.5; }
        .graph-bar-left { position: absolute; top: 0; bottom: 0; left: 0; z-index: 0; transition: width 0.6s cubic-bezier(0.23, 1, 0.32, 1); opacity: 0.35; }
        .hist-main { position: relative; z-index: 3; display: flex; width: 100%; justify-content: space-between; align-items: center; font-size: 13px; }
        .hist-sub { position: relative; z-index: 3; width: 100%; font-size: 10px; text-align: right; margin-top: 4px; font-weight: bold; }

        .data-textarea { width: 100%; height: 120px; background: #000; border: 1px solid #333; border-radius: 12px; color: var(--accent-green); font-family: monospace; font-size: 12px; padding: 12px; margin-bottom: 15px; resize: none; word-break: break-all; }
        .modal-desc { font-size: 11px; color: #aaa; margin-bottom: 15px; line-height: 1.5; }
        .btn-primary { width: 100%; background: var(--accent-blue); color: white; border: none; padding: 14px; border-radius: 12px; font-weight: bold; font-size: 14px; margin-bottom: 10px; }
        
        .logic-box { font-size: 11px; color: var(--text-sub); background: #111; padding: 12px; border-radius: 8px; line-height: 1.6; }
        .btn-close { width:100%; background: #3a3a3c; border:none; color:white; padding:12px; border-radius:12px; margin-top:10px; font-weight:bold; }

        .footer { text-align: center; font-size: 10px; color: #555; margin-top: 50px; line-height: 1.8; padding-bottom: 100px; }
    </style>
</head>
<body>

<div class="container">
    <div class="top-title">pure-water-tracker</div>
    
    <div id="hSec" class="header-section">
        <div class="label-xs">交換まであと</div>
        <div class="main-val-wrap" id="mainValWrap" onclick="showDetail()">
            <span class="main-val" id="remL"><span class="no-ppm-alert">PPMを入力</span></span>
        </div>
        <button class="btn-detail" onclick="showDetail()">コンディション詳細</button>
    </div>

    <div class="sub-stats">
        <span>洗車回数：あと <span id="remCount">--</span> 回分</span>
        <span id="predictDate">寿命予測：--/--頃</span>
    </div>

    <div class="stats-grid">
        <div class="card"><div class="label-xs">累計使用量</div><div id="totalUsed">0 ℓ</div></div>
        <div class="card"><div class="label-xs">今月の使用量</div><div id="monthUsed">0 ℓ</div></div>
    </div>
    <div class="card-full"><div class="label-xs">今月の算出コスト</div><div id="costDisp">0 円</div></div>

    <div class="input-box">
        <div class="input-title">今回の洗車使用量</div>
        <div class="counter-row">
            <button class="btn-round" onclick="add(-1)">−</button>
            <div class="current-disp"><span id="inVal">0</span><span style="font-size:24px; margin-left:4px; color:var(--text-sub);">ℓ</span></div>
            <button class="btn-round" onclick="add(1)">＋</button>
        </div>
        <button class="btn-clear" onclick="clr()">入力をリセット</button>
        <div class="quick-grid">
            <button class="btn-q" onclick="add(5)">+5ℓ</button><button class="btn-q" onclick="add(10)">+10ℓ</button><button class="btn-q" onclick="add(20)">+20ℓ</button>
            <button class="btn-q" onclick="add(30)">+30ℓ</button><button class="btn-q" onclick="add(50)">+50ℓ</button><button class="btn-q" onclick="add(100)">+100ℓ</button>
        </div>
    </div>

    <button class="btn-save" id="saveBtn" onclick="save()">数値を入力してください</button>
    <button id="resetBtn" class="btn-reset">長押しで樹脂リセット</button>
    
    <div class="settings-box">
        <div class="setting-item">
            <span class="label-xs" style="color:#fff; font-size:12px;">水道水硬度 (ppm)</span>
            <input type="number" id="ppmIn" class="ppm-input" placeholder="0" oninput="setPPM(this.value)" pattern="\d*">
        </div>
        <div class="mode-row">
            <button id="mPRO" class="btn-m" onclick="mode('PRO')">PRO (3個)</button>
            <button id="mJUST" class="btn-m" onclick="mode('JUST')">JUST (2個)</button>
        </div>
        
        <div class="backup-section">
            <div class="backup-label">データ移行・復元</div>
            <div class="backup-guide">機種変更時に記録をコードで引き継げます。</div>
            <div class="backup-row">
                <button class="btn-b" onclick="openTransferModal('export')">書き出し</button>
                <button class="btn-b" onclick="openTransferModal('import')">読み込み</button>
            </div>
        </div>
    </div>

    <div class="footer">Version 1.0.2<br>© 2026 missing link.</div>
</div>

<div id="modalOverlay" class="modal-overlay" onclick="closeDetail()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div class="modal-h">コンディション詳細</div>
        <div class="modal-section">
            <div class="modal-label-row"><div class="modal-label">直近10件の使用傾向</div><button class="btn-mini-reset" onclick="resetHistory()">履歴クリア</button></div>
            <div id="historyList"></div>
        </div>
        <div class="modal-section">
            <div class="modal-label-row"><div class="modal-label">月別サマリー</div><button class="btn-mini-reset" onclick="resetSummary()">サマリークリア</button></div>
            <div id="monthSummaryList"></div>
        </div>
        <div class="modal-section"><div class="modal-label">算出ロジック診断</div><div class="logic-box" id="adviceBox"></div></div>
        <button class="btn-close" onclick="closeDetail()">閉じる</button>
    </div>
</div>

<div id="transferModal" class="modal-overlay" onclick="closeTransferModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div id="transferTitle" class="modal-h">データ移行</div>
        <div id="transferDesc" class="modal-desc"></div>
        <textarea id="transferArea" class="data-textarea"></textarea>
        <button id="transferActionBtn" class="btn-primary" onclick="handleTransferAction()">コピーする</button>
        <button class="btn-close" onclick="closeTransferModal()">閉じる</button>
    </div>
</div>

<script>
    const STORAGE_KEY = 'pwMasterV4';
    let d = JSON.parse(localStorage.getItem(STORAGE_KEY)) || { ppm: null, m: 'PRO', used: 0, in: 0, logs: {}, history: [] };

    function vib(ms) { if (navigator.vibrate) navigator.vibrate(ms); }

    function getRecentAvg() {
        if (!d.history || d.history.length === 0) return 30;
        const recent = d.history.slice(0, 5);
        return Math.round(recent.reduce((a, b) => a + b.amt, 0) / recent.length);
    }

    function getAvgInterval() {
        if (!d.history || d.history.length < 2) return 7;
        let total = 0, count = 0;
        for (let i = 0; i < d.history.length - 1; i++) {
            if (d.history[i].ts && d.history[i+1].ts) {
                total += (d.history[i].ts - d.history[i+1].ts) / 86400000;
                count++;
            }
        }
        return count > 0 ? Math.max(1, total / count) : 7;
    }

    function up() {
        const remL = document.getElementById('remL');
        const saveBtn = document.getElementById('saveBtn');
        const monthKey = `${new Date().getFullYear()}-${String(new Date().getMonth() + 1).padStart(2, '0')}`;
        const resinPrice = (d.m === 'PRO' ? 12980 : 9878);

        if (d.ppm !== null) document.getElementById('ppmIn').value = d.ppm;
        document.body.classList.remove('alert-red');
        remL.style.color = '';

        if (!d.ppm) {
            remL.innerHTML = '<span class="no-ppm-alert">PPMを入力</span>';
        } else {
            const cap = (d.m === 'PRO' ? 180000 : 90000) / d.ppm;
            const rem = Math.max(0, cap - d.used);
            const ratio = rem / cap;
            const avg = getRecentAvg();
            remL.innerHTML = Math.floor(rem) + '<span class="unit-l">ℓ</span>';
            document.getElementById('remCount').innerText = Math.floor(rem / avg);
            if (ratio < 0.1) { remL.style.color = 'var(--accent-red)'; document.body.classList.add('alert-red'); }
            else if (ratio < 0.3) remL.style.color = 'var(--accent-yellow)';
            else remL.style.color = 'var(--accent-green)';
            document.getElementById('costDisp').innerText = Math.round(((d.logs[monthKey]||0)/cap)*resinPrice).toLocaleString() + ' 円';
            
            const daysRem = Math.floor((rem/avg)*getAvgInterval());
            const t = new Date(); t.setDate(t.getDate()+daysRem);
            document.getElementById('predictDate').innerText = `寿命予測：${t.getMonth()+1}/${t.getDate()}頃`;
        }
        document.getElementById('totalUsed').innerText = d.used + ' ℓ';
        document.getElementById('monthUsed').innerText = (d.logs[monthKey]||0) + ' ℓ';
        document.getElementById('inVal').innerText = d.in;
        saveBtn.innerText = d.in > 0 ? `${d.in}ℓ の使用を記録` : '数値を入力してください';
        saveBtn.style.opacity = d.in > 0 ? "1" : "0.3";
        saveBtn.style.pointerEvents = d.in > 0 ? "auto" : "none";
        document.getElementById('mPRO').className = d.m === 'PRO' ? 'btn-m active' : 'btn-m';
        document.getElementById('mJUST').className = d.m === 'JUST' ? 'btn-m active' : 'btn-m';
        localStorage.setItem(STORAGE_KEY, JSON.stringify(d));
    }

    function save() {
        if (!d.ppm) return; vib(30);
        const resinPrice = (d.m === 'PRO' ? 12980 : 9878), cap = (d.m === 'PRO' ? 180000 : 90000) / d.ppm;
        const avg = getRecentAvg();
        if (d.in > 0) {
            let lv = d.in > avg*1.5 ? 'danger' : (d.in > avg*1.2 ? 'warn' : 'normal');
            d.history.unshift({ ts: Date.now(), date: `${new Date().getMonth()+1}/${new Date().getDate()}`, amt: d.in, cost: Math.round((d.in/cap)*resinPrice), wasteL: Math.max(0, d.in-avg), wasteCost: Math.round((Math.max(0, d.in-avg)/cap)*resinPrice), refAvg: avg, level: lv });
            if(d.history.length > 10) d.history.pop();
            d.used += d.in;
            const k = `${new Date().getFullYear()}-${String(new Date().getMonth()+1).padStart(2, '0')}`;
            d.logs[k] = (d.logs[k]||0) + d.in;
        }
        d.in = 0; up();
    }

    let longTimer;
    const rb = document.getElementById('resetBtn'), wrap = document.getElementById('mainValWrap');
    const startR = (e) => {
        if(e.type==='touchstart') e.preventDefault();
        wrap.classList.add('resetting');
        setTimeout(() => wrap.classList.add('reset-active'), 10); // アニメーション遅延復活
        vib(10);
        longTimer = setTimeout(() => {
            vib([50,30,50]);
            if(confirm("樹脂記録をリセット？")){ d.used=0; d.in=0; up(); }
            cancelR();
        }, 1000);
    };
    const cancelR = () => { clearTimeout(longTimer); wrap.classList.remove('resetting', 'reset-active'); };
    rb.addEventListener('touchstart', startR, {passive:false}); rb.addEventListener('mousedown', startR);
    window.addEventListener('touchend', cancelR); window.addEventListener('mouseup', cancelR);

    function showDetail() {
        if(!d.ppm) return;
        const resinPrice = (d.m==='PRO'?12980:9878), cap = (d.m==='PRO'?180000:90000)/d.ppm;
        const hList = document.getElementById('historyList');
        hList.innerHTML = d.history.length ? '' : '<div style="font-size:12px;color:#555;text-align:center;padding:20px;">履歴なし</div>';
        d.history.forEach(h => {
            const ratio = h.amt / (h.refAvg||30), barW = Math.min(100, ratio*50);
            let c = 'var(--accent-green)', txt = `節約中`;
            if(h.level==='danger'){ c='var(--accent-red)'; txt=`🔥多すぎ (+${h.wasteL}ℓ 約${h.wasteCost}円損)`; }
            else if(h.level==='warn'){ c='var(--accent-yellow)'; txt=`⚠️多め (+${h.wasteL}ℓ 約${h.wasteCost}円損)`; }
            hList.innerHTML += `<div class="history-item"><div class="avg-guide-line"></div><div class="graph-bar-left" style="width:${barW}%; background:${c};"></div><div class="hist-main"><span>${h.date}</span><span style="font-weight:bold;">${h.amt}ℓ</span><span>${h.cost}円</span></div><div class="hist-sub" style="color:${c}">${txt}</div></div>`;
        });
        const sList = document.getElementById('monthSummaryList');
        const keys = Object.keys(d.logs).sort().reverse();
        sList.innerHTML = keys.length ? '' : '<div style="font-size:12px;color:#555;text-align:center;padding:20px;">なし</div>';
        keys.slice(0,12).forEach(k => {
            sList.innerHTML += `<div class="history-item"><div class="hist-main"><span>${k}</span><span>${d.logs[k]}ℓ</span><span>${Math.round((d.logs[k]/cap)*resinPrice)}円</span></div></div>`;
        });
        document.getElementById('adviceBox').innerHTML = `・直近平均: ${getRecentAvg()}ℓ<br>・洗車間隔: ${Math.round(getAvgInterval()*10)/10}日<br>・想定価格: ${resinPrice.toLocaleString()}円`;
        document.getElementById('modalOverlay').style.display = 'flex'; vib(10);
    }

    let tMode = '';
    function openTransferModal(m) {
        tMode = m; const area = document.getElementById('transferArea'), btn = document.getElementById('transferActionBtn');
        if(m==='export'){
            document.getElementById('transferTitle').innerText='データ書き出し';
            area.value = btoa(unescape(encodeURIComponent(JSON.stringify(d)))); area.readOnly = true; btn.innerText = 'コピーする';
            setTimeout(()=>area.select(), 100);
        } else {
            document.getElementById('transferTitle').innerText='データ読み込み';
            area.value = ''; area.readOnly = false; btn.innerText = '復元する';
        }
        document.getElementById('transferModal').style.display='flex';
    }
    function handleTransferAction() {
        const area = document.getElementById('transferArea');
        if(tMode==='export'){
            navigator.clipboard.writeText(area.value).then(() => { vib([30,30]); alert("コピー完了！"); });
        } else {
            try {
                d = JSON.parse(decodeURIComponent(escape(atob(area.value.trim()))));
                localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); up(); alert("復元成功！"); closeTransferModal();
            } catch(e) { alert("無効なコードです"); }
        }
    }
    function closeTransferModal() { document.getElementById('transferModal').style.display='none'; }
    function setPPM(v) { d.ppm = v===""?null:parseInt(v); up(); }
    function add(v) { d.in = Math.max(0, d.in+v); vib(5); up(); }
    function clr() { d.in=0; vib(5); up(); }
    function mode(m) { d.m=m; vib(10); up(); }
    function closeDetail() { document.getElementById('modalOverlay').style.display='none'; }
    function resetHistory() { if(confirm("履歴消去？")){ d.history=[]; up(); showDetail(); } }
    function resetSummary() { if(confirm("月別消去？")){ d.logs={}; up(); showDetail(); } }
    up();
</script>
</body>
</html>
