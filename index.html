<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PURE WATER TRACKER</title>
    <style>
        :root {
            --bg-color: #0c0c0c;
            --card-bg: #1c1c1e;
            --accent-green: #34c759;
            --accent-yellow: #ffcc00;
            --accent-red: #ff453a;
            --accent-blue: #0a84ff;
            --text-main: #ffffff;
            --text-sub: #8e8e93;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 380px; }

        .top-title { font-size: 18px; font-weight: 900; text-align: center; margin-bottom: 2px; letter-spacing: 2.5px; text-transform: uppercase; }
        .top-title span { color: var(--accent-blue); }
        .top-sub { font-size: 9px; color: var(--text-sub); text-align: center; margin-bottom: 25px; font-weight: 500; letter-spacing: 1px; }
        
        .header-section { text-align: center; margin-bottom: 20px; min-height: 200px; display: flex; flex-direction: column; justify-content: center; align-items: center; width: 100%; }
        .label-xs { font-size: 10px; color: var(--text-sub); margin-bottom: 8px; }
        
        .tutorial-box { background: rgba(10, 132, 255, 0.05); border: 1px dashed rgba(10, 132, 255, 0.5); padding: 25px 20px; border-radius: 24px; width: 100%; text-align: left; }
        .step-row { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; font-size: 13px; font-weight: 600; }
        .step-num { background: var(--accent-blue); color: #fff; font-size: 10px; padding: 2px 6px; border-radius: 4px; }
        .step-active { color: var(--accent-yellow); border-bottom: 1px solid var(--accent-yellow); }

        .main-val-wrap { position: relative; display: inline-block; margin-bottom: 15px; cursor: pointer; }
        .main-val { font-size: 64px; font-weight: 800; line-height: 1; }
        .unit-l { font-size: 32px; font-weight: 400; margin-left: 4px; }
        
        .sub-stats { display: flex; justify-content: space-around; font-size: 11px; color: var(--text-sub); margin-bottom: 25px; width: 100%; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; width: 100%; }
        .card { background: var(--card-bg); padding: 15px; border-radius: 12px; text-align: center; }
        .card-full { background: var(--card-bg); padding: 15px; border-radius: 12px; text-align: center; margin-bottom: 25px; width: 100%; }
        
        .input-box { background: var(--card-bg); padding: 25px 20px; border-radius: 20px; margin-bottom: 15px; width: 100%; }
        .input-title { font-size: 11px; color: var(--accent-green); font-weight: bold; text-align: center; margin-bottom: 15px; }
        .counter-row { display: flex; justify-content: center; align-items: center; gap: 40px; margin-bottom: 15px; }
        .btn-round { width: 50px; height: 50px; border-radius: 50%; border: none; background: #3a3a3c; color: white; font-size: 26px; }
        .current-disp { font-size: 52px; font-weight: bold; }
        .btn-clear { background: #3a3a3c; color: var(--text-sub); border: none; padding: 6px 16px; border-radius: 20px; font-size: 11px; display: block; margin: 0 auto 20px; }
        .quick-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .btn-q { background: #2c2c2e; border: none; padding: 14px 5px; border-radius: 10px; color: white; font-weight: 600; font-size: 12px; }
        
        .btn-save { width: 100%; background: var(--accent-green); color: white; padding: 22px; border-radius: 18px; border: none; font-size: 16px; font-weight: bold; margin-bottom: 15px; }
        .btn-reset { width: 100%; background: none; border: 1px solid var(--accent-red); color: var(--accent-red); padding: 12px; border-radius: 12px; font-size: 11px; margin-bottom: 25px; }
        
        .settings-box { background: var(--card-bg); padding: 25px 20px; border-radius: 20px; width: 100%; }
        .setting-item { display: flex; justify-content: space-between; align-items: flex-end; padding: 12px 0; border-bottom: 1px solid #2c2c2e; margin-bottom: 10px; }
        .ppm-input { background: none; border: none; color: var(--accent-green); font-weight: bold; font-size: 18px; text-align: right; width: 80px; }
        .mode-row { display: flex; gap: 8px; margin-top: 5px; }
        .btn-m { flex: 1; background: #2c2c2e; border: none; padding: 12px; border-radius: 10px; color: #666; font-weight: bold; font-size: 13px; border: 1px solid transparent; }
        .btn-m.active { border: 1px solid var(--accent-green); color: var(--accent-green); }

        /* モーダル */
        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); display:none; justify-content:center; align-items:center; z-index:1000; padding:20px; }
        .modal-content { background: #1c1c1e; width:100%; max-width:360px; border-radius:24px; padding:25px; border: 1px solid #3a3a3c; overflow-y: auto; max-height: 90vh; }
        .detail-title { color: var(--accent-blue); text-align: center; font-size: 18px; font-weight: bold; margin-bottom: 25px; }
        .detail-label { font-size: 11px; color: var(--text-sub); display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
        .detail-label::before { content: ""; width: 3px; height: 14px; background: var(--accent-blue); border-radius: 2px; }
        .chart-box { background: #141414; border-radius: 12px; padding: 20px; text-align: center; color: #555; font-size: 12px; margin-bottom: 25px; }
        .summary-card { background: #2c2c2e; border-radius: 12px; padding: 15px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .summary-date { font-size: 16px; font-weight: 500; }
        .summary-val { font-size: 16px; font-weight: bold; }
        .btn-del-mini { background: rgba(255,69,58,0.1); border: none; color: var(--accent-red); font-size: 10px; padding: 6px 12px; border-radius: 6px; }
        .logic-card { background: #141414; border-radius: 12px; padding: 15px; margin-bottom: 25px; }
        .logic-item { font-size: 12px; color: var(--text-sub); margin-bottom: 8px; line-height: 1.6; }
        .blue-text { color: var(--accent-blue); }
    </style>
</head>
<body>

<div class="container">
    <div class="top-title">PURE WATER <span>TRACKER.</span></div>
    <div class="top-sub">ULTIMATE RESIN MANAGEMENT TOOL</div>

    <div class="header-section" id="headerSection"></div>

    <div class="sub-stats"><span>洗車回数：あと <span id="remCount">--</span> 回分</span><span id="predictDate">寿命予測：--/--頃</span></div>

    <div class="stats-grid">
        <div class="card"><div class="label-xs">累計使用量</div><div id="totalUsed">0 ℓ</div></div>
        <div class="card"><div class="label-xs">今月の使用量</div><div id="monthUsed">0 ℓ</div></div>
    </div>
    <div class="card-full"><div class="label-xs">今月の算出コスト</div><div id="costDisp">0 円</div></div>

    <div class="input-box">
        <div class="input-title">今回の洗車使用量</div>
        <div class="counter-row">
            <button class="btn-round" onclick="add(-1)">−</button>
            <div class="current-disp"><span id="inVal">0</span><span style="font-size:24px; margin-left:4px; color:var(--text-sub);">ℓ</span></div>
            <button class="btn-round" onclick="add(1)">＋</button>
        </div>
        <button class="btn-clear" onclick="clr()">入力をリセット</button>
        <div class="quick-grid">
            <button class="btn-q" onclick="add(5)">+5ℓ</button><button class="btn-q" onclick="add(10)">+10ℓ</button><button class="btn-q" onclick="add(20)">+20ℓ</button>
            <button class="btn-q" onclick="add(30)">+30ℓ</button><button class="btn-q" onclick="add(50)">+50ℓ</button><button class="btn-q" onclick="add(100)">+100ℓ</button>
        </div>
    </div>

    <button class="btn-save" id="saveBtn" onclick="save()">数値を入力してください</button>
    <button id="resetBtn" class="btn-reset">長押しで樹脂リセット</button>
    
    <div class="settings-box">
        <div class="setting-item">
            <div>
                <span class="label-xs" style="color:#fff; font-size:12px;">STEP1：水道水硬度 (ppm)</span><br>
                <span style="font-size:9px; color:var(--accent-yellow);">※水質が寿命を決定します</span>
            </div>
            <input type="number" id="ppmIn" class="ppm-input" placeholder="0" oninput="setPPM(this.value)">
        </div>
        <div class="mode-row">
            <button id="mPRO" class="btn-m" onclick="mode('PRO')">PRO (3個)</button>
            <button id="mJUST" class="btn-m" onclick="mode('JUST')">JUST (2個)</button>
        </div>
    </div>

    <div style="text-align:center; font-size:10px; color:#444; margin-top:40px; padding-bottom:40px;">
        Version 1.0.2 © 2026 missing link.
    </div>
</div>

<div id="modalOverlay" class="modal-overlay" onclick="closeDetail()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div class="detail-title">コンディション詳細</div>
        
        <div class="detail-label">直近10件の使用傾向（白線：平均）</div>
        <div class="chart-box" id="chartBox">履歴なし</div>

        <div class="detail-label">月別サマリー</div>
        <div id="monthlySummaryArea"></div>

        <div class="detail-label">算出ロジックの根拠と診断</div>
        <div class="logic-card" id="logicArea"></div>

        <button style="width:100%; background:#3a3a3c; border:none; color:white; padding:18px; border-radius:18px; font-weight:bold;" onclick="closeDetail()">閉じる</button>
    </div>
</div>

<script>
    const STORAGE_KEY = 'pwMasterV102';
    let d = JSON.parse(localStorage.getItem(STORAGE_KEY)) || { ppm: null, m: 'PRO', used: 0, in: 0, logs: {}, history: [] };

    function up() {
        const header = document.getElementById('headerSection');
        const saveBtn = document.getElementById('saveBtn');
        const now = new Date(), monthKey = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
        const resinPrice = (d.m === 'PRO' ? 12980 : 9878);

        if (!d.ppm) {
            header.innerHTML = `<div class="tutorial-box"><div class="step-row"><span class="step-num">STEP 1</span> <span class="step-active">PPMを入力</span></div><div class="step-row"><span class="step-num">STEP 2</span> <span>使用量を記録</span></div></div>`;
            document.getElementById('remCount').innerText = "--";
            document.getElementById('predictDate').innerText = "寿命予測：--/--頃";
            document.getElementById('costDisp').innerText = "0 円";
        } else {
            const cap = (d.m === 'PRO' ? 180000 : 90000) / d.ppm;
            const rem = Math.max(0, cap - d.used);
            const avg = d.history.length > 0 ? Math.round(d.history.slice(0,5).reduce((a,b)=>a+b.amt,0)/Math.min(d.history.length, 5)) : 30;
            
            header.innerHTML = `<div class="label-xs">交換まであと</div><div class="main-val-wrap" onclick="showDetail()"><span class="main-val" id="remDisplay">${Math.floor(rem)}<span class="unit-l">ℓ</span></span></div><button style="background:none; border:1px solid #3a3a3c; color:var(--text-sub); padding:8px 16px; border-radius:20px; font-size:11px;" onclick="showDetail()">履歴・詳細を表示</button>`;
            
            const remDisp = document.getElementById('remDisplay');
            remDisp.style.color = (rem/cap < 0.1) ? 'var(--accent-red)' : (rem/cap < 0.3) ? 'var(--accent-yellow)' : 'var(--accent-green)';
            document.getElementById('remCount').innerText = Math.floor(rem / avg);
            document.getElementById('costDisp').innerText = Math.round(((d.logs[monthKey]||0)/cap)*resinPrice).toLocaleString() + ' 円';
            
            const daysRem = Math.floor((rem/avg)*7); 
            const t = new Date(); t.setDate(now.getDate()+daysRem);
            document.getElementById('predictDate').innerText = `寿命予測：${t.getMonth()+1}/${t.getDate()}頃`;
        }

        document.getElementById('ppmIn').value = d.ppm || "";
        document.getElementById('totalUsed').innerText = d.used + ' ℓ';
        document.getElementById('monthUsed').innerText = (d.logs[monthKey]||0) + ' ℓ';
        document.getElementById('inVal').innerText = d.in;
        saveBtn.innerText = d.in > 0 ? `${d.in}ℓ の記録を保存` : '数値を入力してください';
        saveBtn.style.opacity = (d.in > 0 && d.ppm) ? "1" : "0.3";
        document.getElementById('mPRO').className = d.m === 'PRO' ? 'btn-m active' : 'btn-m';
        document.getElementById('mJUST').className = d.m === 'JUST' ? 'btn-m active' : 'btn-m';
        localStorage.setItem(STORAGE_KEY, JSON.stringify(d));
    }

    function setPPM(v) { d.ppm = v===""?null:parseInt(v); up(); }
    function add(v) { d.in = Math.max(0, d.in+v); up(); }
    function clr() { d.in=0; up(); }
    function mode(m) { d.m=m; up(); }
    
    function save() {
        if (!d.ppm || d.in <= 0) return;
        const now = new Date(), monthKey = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2, '0')}`;
        d.history.unshift({ ts: now.getTime(), amt: d.in });
        d.used += d.in; d.logs[monthKey] = (d.logs[monthKey]||0) + d.in;
        d.in = 0; up();
    }

    function delLog(key) { if(confirm(`${key}の記録を消去しますか？`)) { delete d.logs[key]; up(); showDetail(); } }

    function showDetail() {
        const capTotal = (d.m === 'PRO' ? 180000 : 90000), resinPrice = (d.m === 'PRO' ? 12980 : 9878);
        const cap = capTotal / (d.ppm || 1), perL = (resinPrice / cap).toFixed(1);
        const avg = d.history.length > 0 ? Math.round(d.history.slice(0,10).reduce((a,b)=>a+b.amt,0)/Math.min(d.history.length, 10)) : 30;

        let sumHTML = "";
        Object.keys(d.logs).sort().reverse().forEach(key => {
            sumHTML += `<div class="summary-card"><span class="summary-date">${key}</span><span class="summary-val">${d.logs[key]}ℓ</span><span class="summary-val">${Math.round((d.logs[key]/cap)*resinPrice).toLocaleString()}円</span><button class="btn-del-mini" onclick="delLog('${key}')">消去</button></div>`;
        });
        document.getElementById('monthlySummaryArea').innerHTML = sumHTML || '<div style="text-align:center; color:#555; padding:20px;">履歴なし</div>';

        document.getElementById('logicArea').innerHTML = `
            <div class="logic-item">・イオン交換容量：${capTotal.toLocaleString()} (ppm・ℓ)</div>
            <div class="logic-item">・算出寿命：${Math.floor(cap).toLocaleString()} ℓ (水質 ${d.ppm}ppm)</div>
            <div class="logic-item">・樹脂価格：${resinPrice.toLocaleString()} 円 / 1ℓ単価：約 ${perL}円</div>
            <div class="logic-item blue-text" style="margin-top:10px;">・直近10件平均：${avg} ℓ</div>
            <div class="logic-item blue-text">・1回コスト目安：${Math.round(avg * perL).toLocaleString()} 円</div>`;

        document.getElementById('chartBox').innerText = d.history.length > 0 ? `直近${Math.min(d.history.length, 10)}件のデータを蓄積中` : "履歴なし";
        document.getElementById('modalOverlay').style.display='flex';
    }
    
    function closeDetail() { document.getElementById('modalOverlay').style.display='none'; }

    let longTimer;
    const rb = document.getElementById('resetBtn');
    rb.addEventListener('touchstart', (e) => { e.preventDefault(); longTimer = setTimeout(() => { if(confirm("累計使用量をリセットしますか？")){ d.used=0; d.history=[]; d.logs={}; up(); } }, 1000); });
    rb.addEventListener('touchend', () => clearTimeout(longTimer));

    up();
</script>
</body>
</html>
