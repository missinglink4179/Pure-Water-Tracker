<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pure Water Tracker</title>
    <style>
        :root {
            --bg-color: #000000;
            --container-bg: #1a1a1a;
            --text-color: #ffffff;
            --accent-color: #007bff;
            --danger-color: #dc3545;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header {
            width: 100%;
            background-color: #28a745;
            padding: 10px 0;
            text-align: center;
            font-weight: bold;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .container {
            width: 90%;
            max-width: 400px;
            margin-top: 20px;
            background-color: var(--container-bg);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-reset { background-color: #333; color: white; width: auto; padding: 5px 15px; font-size: 12px; }
        .btn-record { background-color: var(--accent-color); color: white; }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: var(--container-bg);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            width: 80%;
        }

        .info-text {
            font-size: 13px;
            color: #888;
            margin-top: 20px;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div class="header">記録する</div>

    <div class="container">
        <button class="btn-reset" onclick="startResetTimer()">樹脂リセット</button>
        
        <div id="display-area">
            </div>

        <div class="info-text">
            このアプリは個人が作成した純水使用量の管理ツールです。<br>
            「ピュアニッシュ PRO / JUST」の仕様を参考にしていますが、公式とは一切関係ありません。<br>
            <br>
            参考：<br>
            監修　ビューティフルカーズ<br>
            製造　グリーンライフ<br>
            <br>
            作成：missing link<br>
            個人利用の範囲でご使用ください。<br>
            ※数値は目安です
        </div>
    </div>

    <script>
        // アプリの動作ロジック（最新版）
        let appState = {
            totalUsed: 0,
            lastMode: 'RESIN'
        };

        function startResetTimer() {
            if(confirm("全ての記録をリセットしますか？")) {
                appState.totalUsed = 0;
                alert("リセットしました");
                location.reload();
            }
        }

        // その他の必要な関数（openModal等）をここに記述
    </script>
</body>
</html>
